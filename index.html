<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zay</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Link to Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <header class="container">
      <div class="wrapper">
        <div class="header-links">
          <div class="contact-links">
            <a href="mailto:info@company.com" class="contact-item">
              <i class="fa-regular fa-envelope" aria-hidden="true"></i>
              <span>info@company.com</span>
            </a>
            <a href="tel:+923001234567" class="contact-item">
              <i class="fa-solid fa-phone" aria-hidden="true"></i>
              <span>+92 300 1234567</span>
            </a>
          </div>

          <div class="social-links">
            <a
              href="https://www.facebook.com"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Facebook"
            >
              <i class="fa-brands fa-facebook" aria-hidden="true"></i>
            </a>
            <a
              href="https://www.instagram.com"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Instagram"
            >
              <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            </a>
            <a
              href="https://www.x.com"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Twitter"
            >
              <i class="fa-brands fa-square-twitter" aria-hidden="true"></i>
            </a>
            <a
              href="https://www.linkedin.com"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="LinkedIn"
            >
              <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </header>

    <nav id="main-nav">
      <div class="wrapper">
        <div class="navbar">
          <div class="logo">Zay</div>

          <ul class="pages-links">
            <li><a href="#Home">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
          </ul>

          <div class="navigation-tool">
            <button type="button" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            </button>
            <button type="button" aria-label="Cart">
              <i class="fa-solid fa-cart-arrow-down" aria-hidden="true"></i>
            </button>
            <button type="button" aria-label="Account">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
